name: Build & Release MeshLink

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p android/gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.0.0/gradle/wrapper/gradle-wrapper.jar" \
            -o android/gradle/wrapper/gradle-wrapper.jar
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk MeshLink-Android.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MeshLink-Android
          path: MeshLink-Android.apk

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate icon.ico
        run: |
          pip install Pillow
          python -c "
          from PIL import Image
          img = Image.open('electron/icon.png').convert('RGBA')
          sizes = [(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)]
          imgs = [img.resize(s, Image.LANCZOS) for s in sizes]
          imgs[0].save('electron/icon.ico', format='ICO', sizes=sizes, append_images=imgs[1:])
          print('icon.ico created')
          "
        shell: bash
      - name: Install & Build
        run: |
          cd electron
          npm install --force
          npx electron-builder --win --x64 --publish=never
        shell: bash
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MeshLink-Windows
          path: electron/dist/MeshLink*.exe

  build-mac:
    name: Build Mac DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate icon.icns
        run: |
          mkdir -p electron/icon.iconset
          sips -z 16 16   electron/icon.png --out electron/icon.iconset/icon_16x16.png
          sips -z 32 32   electron/icon.png --out electron/icon.iconset/icon_16x16@2x.png
          sips -z 32 32   electron/icon.png --out electron/icon.iconset/icon_32x32.png
          sips -z 64 64   electron/icon.png --out electron/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 electron/icon.png --out electron/icon.iconset/icon_128x128.png
          sips -z 256 256 electron/icon.png --out electron/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 electron/icon.png --out electron/icon.iconset/icon_256x256.png
          sips -z 512 512 electron/icon.png --out electron/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 electron/icon.png --out electron/icon.iconset/icon_512x512.png
          iconutil -c icns electron/icon.iconset -o electron/icon.icns
      - name: Install & Build
        run: |
          cd electron
          npm install
          npx electron-builder --mac --publish=never
      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: MeshLink-Mac
          path: electron/dist/MeshLink*.dmg

  release:
    name: Create GitHub Release
    needs: [build-android, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: MeshLink v1.0.${{ github.run_number }}
          body: |
            # 📡 MeshLink — Offline Bluetooth Mesh Network
            | Platform | File |
            |----------|------|
            | 📱 Android | MeshLink-Android.apk |
            | 🪟 Windows | MeshLink-Setup.exe |
            | 🍎 Mac | MeshLink.dmg |
          files: |
            dist/MeshLink-Android/MeshLink-Android.apk
            dist/MeshLink-Windows/MeshLink*.exe
            dist/MeshLink-Mac/MeshLink*.dmg
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
